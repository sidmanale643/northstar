# For detailed configuration reference, see https://supabase.com/docs/guides/cli/local-development

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
enable_manual_linking = false

# Google OAuth. In hosted Supabase, configure the client id/secret in the
# dashboard. For local `supabase start`, set SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID
# and SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET in the local env.
[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET)"
redirect_uri = ""

[analytics]
enabled = false

[functions.ingest-traces]
enabled = true
verify_jwt = false
